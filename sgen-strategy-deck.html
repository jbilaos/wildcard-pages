<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>SGEN — Strategy Preview</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root{ --red:#d51522; --red2:#ff3b4a; --ink:#eaf0f7; --mut:#8fa0b6; --line:#26262e; --card:#0e0e11; }
            .staticrypt-html{ height:100%; }
            .staticrypt-body{ height:100%; margin:0; }

            .staticrypt-content{
                height:100%;
                margin:0;
                background:#000;
                color:var(--ink);
                font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
                -webkit-font-smoothing:antialiased;
                -moz-osx-font-smoothing:grayscale;
            }

            .staticrypt-page{
                width:380px;
                max-width:90vw;
                padding:0;
                margin:0 auto;
                box-sizing:border-box;
                min-height:100%;
                display:flex;
                align-items:center;
                justify-content:center;
            }

            .staticrypt-form{
                position:relative;
                z-index:1;
                background:var(--card);
                width:100%;
                max-width:380px;
                margin:0 auto;
                padding:38px 34px 34px;
                text-align:center;
                border:1px solid var(--line);
                border-top:3px solid var(--red);
                border-radius:16px;
                box-shadow:0 20px 60px -24px rgba(255,59,74,.35);
            }

            .sg-wordmark{
                font-family:ui-monospace,Menlo,Consolas,monospace;
                font-size:12px; font-weight:800; letter-spacing:.28em; text-transform:uppercase;
                color:var(--red2); margin-bottom:6px;
            }
            .staticrypt-instructions{ margin:0 0 8px; }
            .staticrypt-title{ font-size:1.35em; font-weight:800; letter-spacing:-.01em; color:#fff; margin:0 0 6px; }
            .staticrypt-instructions p:not(.staticrypt-title){ font-size:13px; color:var(--mut); line-height:1.5; margin:0; }

            .staticrypt-hr{ margin:20px 0; border:0; border-top:1px solid var(--line); }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{
                background:inherit; border:0; box-sizing:border-box;
                font-size:14px; outline:0; color:var(--ink);
                padding:15px 40px 15px 15px; width:100%;
            }
            .staticrypt-form input::placeholder{ color:#5d6b80; }

            .staticrypt-password-container{
                position:relative; outline:0;
                background:#1a1a20; width:100%;
                border:1px solid var(--line); border-radius:10px;
                margin:0 0 15px; box-sizing:border-box;
            }

            .staticrypt-toggle-password-visibility{
                cursor:pointer; height:20px; opacity:.55; padding:13px;
                position:absolute; right:0; top:50%; transform:translateY(-50%);
                width:20px; filter:invert(70%);
            }

            .staticrypt-form .staticrypt-decrypt-button{
                text-transform:uppercase; letter-spacing:.05em; font-weight:800;
                outline:0; background:var(--red); width:100%; border:0; border-radius:10px;
                padding:15px; color:#fff; font-size:14px; cursor:pointer; transition:.12s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus{
                background:var(--red2); filter:brightness(104%);
            }

            label.staticrypt-remember{ display:flex; align-items:center; margin:14px 0 2px; font-size:12px; color:var(--mut); }
            .staticrypt-remember input[type="checkbox"]{ transform:scale(1.3); margin-right:.8em; accent-color:var(--red); }

            .hidden{ display:none !important; }

            .staticrypt-spinner-container{ height:100%; display:flex; align-items:center; justify-content:center; background:#000; }
            .staticrypt-spinner{
                display:inline-block; width:2rem; height:2rem; vertical-align:text-bottom;
                border:.25em solid #26262e; border-right-color:var(--red);
                border-radius:50%; animation:spinner-border .75s linear infinite;
            }
            @keyframes spinner-border{ 100%{ transform:rotate(360deg); } }

            @media screen and (-webkit-min-device-pixel-ratio:0){
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"]{ font-size:16px; }
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-page">
                <div class="staticrypt-form">
                    <div class="staticrypt-instructions">
                        <div class="sg-wordmark">SGEN</div>
                        <p class="staticrypt-title">SGEN — Strategy Preview</p>
                        <p>Internal. Enter the password shared with you in Slack.</p>

                            Remember me
                        </label>

                        <input type="submit" class="staticrypt-decrypt-button" value="Unlock" />
                    </form>
                </div>
            </div>
        </div>
